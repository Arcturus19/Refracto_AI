version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15
    container_name: refracto_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-refracto}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - refracto_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-refracto}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin Service for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: refracto_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - refracto_network
    depends_on:
      - postgres

  # Auth Service (FastAPI)
  auth_service:
    build:
      context: ./services/auth_service
      dockerfile: Dockerfile
    container_name: refracto_auth_service
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/refracto}
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_me}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-access_token}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8001:8000"
    networks:
      - refracto_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  # Patient Service (FastAPI)
  patient_service:
    build:
      context: ./services/patient_service
      dockerfile: Dockerfile
    container_name: refracto_patient_service
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/refracto}
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_me}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-access_token}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev_internal_token_change_me}
    ports:
      - "8002:8000"
    networks:
      - refracto_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  # MinIO Object Storage Service
  minio:
    image: minio/minio
    container_name: refracto_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./minio_data:/data
    networks:
      - refracto_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # Imaging Service (FastAPI)
  imaging_service:
    build:
      context: ./services/imaging_service
      dockerfile: Dockerfile
    container_name: refracto_imaging_service
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/refracto}
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_me}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-access_token}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev_internal_token_change_me}
      PATIENT_SERVICE_URL: ${PATIENT_SERVICE_URL:-http://patient_service:8000}
      ACCESS_ENFORCEMENT_MODE: ${ACCESS_ENFORCEMENT_MODE:-required}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
    ports:
      - "8003:8000"
    networks:
      - refracto_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ML Service (FastAPI + PyTorch)
  ml_service:
    build:
      context: ./services/ml_service
      dockerfile: Dockerfile
    container_name: refracto_ml_service
    restart: always
    environment:
      MODEL_PATH: /app/models
      DEVICE: cpu # Change to 'cuda' if GPU available
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_me}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-access_token}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev_internal_token_change_me}
      PATIENT_SERVICE_URL: ${PATIENT_SERVICE_URL:-http://patient_service:8000}
      CONSENT_ENFORCEMENT_MODE: ${CONSENT_ENFORCEMENT_MODE:-if_patient_provided}
      CONSENT_TYPE: ${CONSENT_TYPE:-ml_analysis}
      AUDIT_LOG_PATH: ${AUDIT_LOG_PATH:-/data/audit/ml_predictions_audit.jsonl}
      AUDIT_HASH_SALT: ${AUDIT_HASH_SALT:-change_me_audit_salt}
    ports:
      - "8004:8000"
    volumes:
      - ./models:/app/models # Mount models directory for persistence
      - ./data:/data # Mount data directory for training datasets
    networks:
      - refracto_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 10m
    # Note: ML service can run independently, no service dependencies

    # DICOM Service (Background Worker)
  dicom_service:
    build:
      context: ./services/dicom_service
      dockerfile: Dockerfile
    container_name: refracto_dicom_service
    restart: always
    environment:
      PATIENT_SERVICE_URL: http://patient_service:8000
      IMAGING_SERVICE_URL: http://imaging_service:8000
      AUTO_INGEST: "true"
      AUTO_CREATE_PATIENTS: "false"
      DELETE_AFTER_UPLOAD: "true"
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev_internal_token_change_me}
    ports:
      - "11112:11112" # DICOM C-STORE port
    volumes:
      - ./dicom_received:/tmp/dicom_received # Persistent DICOM storage
    networks:
      - refracto_network
    depends_on:
      patient_service:
        condition: service_healthy
      imaging_service:
        condition: service_healthy
    # Note: DICOM service runs independently as background worker

volumes:
  postgres_data:
    driver: local
  postgres_data_dev:
    driver: local
  pgadmin_data:
    driver: local

networks:
  refracto_network:
    driver: bridge
